name: Bench Integration

permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'changeset-release/')

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        persist-credentials: false

    - name: Install pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

    - name: Use Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --ignore-scripts

    - name: Build bench package
      run: pnpm --filter @computesdk/bench run build

    - name: Run bench integration tests
      run: pnpm --filter @computesdk/bench run test:integration
      env:
        BENCH_INTEGRATION: "1"
        BENCHMARK_INGEST_URL: https://platform.computesdk.com/api/v1/events
