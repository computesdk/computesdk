name: Sync to computesdk-core

# Triggers:
#   1. When the "Version Packages" changeset PR is merged (bumps versions, deletes changesets)
#   2. Manual workflow_dispatch for ad-hoc syncs
#
# This workflow syncs package.json version fields and consumed changeset deletions
# back to computesdk-core so the mirror workflow doesn't re-introduce stale versions.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if no changes detected'
        required: false
        default: 'false'
        type: boolean

jobs:
  sync-versions:
    runs-on: ubuntu-latest
    # Skip if this push came from the sync bot or from core sync (prevents infinite loop)
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, 'Sync packages from computesdk-core')
    permissions:
      contents: read
    
    steps:
      - name: Checkout OSS repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check if sync is needed
        id: should-sync
        run: |
          # Only sync when version-related files changed (Version Packages merge)
          # or when manually triggered
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Manual trigger - will sync"
            exit 0
          fi

          # Check if the commit message indicates a version bump
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -qiE "^Version Packages"; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "Version Packages commit detected - will sync"
          else
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "Not a version commit, skipping sync"
          fi

      - name: Clone computesdk-core repository
        if: steps.should-sync.outputs.needed == 'true'
        run: |
          git clone https://x-access-token:${{ secrets.ORG_REPO_TOKEN }}@github.com/computesdk/computesdk-core.git core-mirror
      
      - name: Setup Node.js
        if: steps.should-sync.outputs.needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup git and branch
        if: steps.should-sync.outputs.needed == 'true'
        id: setup
        env:
          GH_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
        run: |
          cd core-mirror
          
          BRANCH_NAME="sync/version-bump-from-oss"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if branch exists on remote
          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" > /dev/null 2>&1; then
            git fetch origin "$BRANCH_NAME"
            git fetch origin main
            git checkout -B "$BRANCH_NAME" origin/main
          else
            git fetch origin main
            git checkout -b "$BRANCH_NAME" origin/main
          fi
          
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
      
      - name: Sync version fields and changeset deletions
        if: steps.should-sync.outputs.needed == 'true'
        run: |
          # 1. Update package.json version fields in computesdk-core to match OSS
          for oss_pkg in packages/*/package.json; do
            pkg_dir=$(basename "$(dirname "$oss_pkg")")
            core_pkg="core-mirror/packages/$pkg_dir/package.json"
            
            if [ -f "$core_pkg" ]; then
              oss_version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$oss_pkg','utf8')).version)")
              core_version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$core_pkg','utf8')).version)")
              
              if [ "$oss_version" != "$core_version" ]; then
                node -e "
                  const fs = require('fs');
                  const pkg = JSON.parse(fs.readFileSync('$core_pkg', 'utf8'));
                  pkg.version = '$oss_version';
                  fs.writeFileSync('$core_pkg', JSON.stringify(pkg, null, 2) + '\n');
                "
                echo "Updated $pkg_dir: $core_version -> $oss_version"
              fi
            fi
          done

          # 2. Remove changesets in computesdk-core that no longer exist in OSS
          #    (they were consumed by the changesets release action)
          for core_cs in core-mirror/.changeset/*.md; do
            cs_name=$(basename "$core_cs")
            [ "$cs_name" = "README.md" ] && continue
            
            if [ ! -f ".changeset/$cs_name" ]; then
              rm "$core_cs"
              echo "Removed consumed changeset: $cs_name"
            fi
          done
      
      - name: Check for changes and commit
        if: steps.should-sync.outputs.needed == 'true'
        id: check
        run: |
          cd core-mirror
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to sync"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git commit -m "Sync version bumps from OSS release

          Source commit: ${{ github.sha }}
          Triggered by: ${{ github.event.head_commit.message }}"
          fi
      
      - name: Push branch and create/update PR
        if: steps.should-sync.outputs.needed == 'true' && steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.ORG_REPO_TOKEN }}
        run: |
          cd core-mirror
          
          BRANCH_NAME="${{ steps.setup.outputs.branch_name }}"
          
          git push origin "$BRANCH_NAME" --force
          
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --repo computesdk/computesdk-core --head "$BRANCH_NAME" --state open --json number --jq '.[0].number')
          
          if [ -n "$EXISTING_PR" ]; then
            echo "Updated existing PR #$EXISTING_PR"
          else
            PR_BODY="Automated sync of package version bumps and consumed changeset deletions from the OSS repo."
            PR_BODY="$PR_BODY"$'\n\n'"Triggered by a **Version Packages** merge. Updates package.json version fields and removes consumed changesets."
            PR_BODY="$PR_BODY"$'\n\n'"**Source commit:** ${{ github.sha }}"
            
            gh pr create \
              --repo computesdk/computesdk-core \
              --title "Sync version bumps from OSS release" \
              --body "$PR_BODY" \
              --head "$BRANCH_NAME" \
              --base main
            echo "Created new PR"
          fi
